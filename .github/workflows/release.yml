name: desktop-release

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: npm run desktop:build:win
            artifact_name: prumo-desktop-client-windows
            artifact_path: release/*.exe
          - os: ubuntu-latest
            script: npm run desktop:build:linux
            artifact_name: prumo-desktop-client-linux
            artifact_path: |
              release/*.AppImage
              release/*.deb
    env:
      PRUMO_WEB_CLIENT_DIR: ./prumo-web-client
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout web client
        uses: actions/checkout@v4
        with:
          repository: caio-3htty/prumo-web-client
          path: prumo-web-client

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix ./prumo-web-client ci

      - name: Build desktop artifact
        run: ${{ matrix.script }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
